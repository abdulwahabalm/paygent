<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paygent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header { text-align: center; margin-bottom: 40px; }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c6aff, #3eb6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    header p { color: #94a3b8; margin-top: 8px; }

    .tiers {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tier {
      background: #13131f;
      border: 2px solid #1e1e2e;
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 160px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
      user-select: none;
    }

    .tier:hover { border-color: #7c6aff44; transform: translateY(-1px); }
    .tier.selected { border-color: #7c6aff; background: #13132a; }

    .tier .price { font-size: 1.3rem; font-weight: 700; color: #7c6aff; }
    .tier .label { font-size: 0.85rem; font-weight: 600; margin-top: 4px; }
    .tier .sources { font-size: 0.75rem; color: #64748b; margin-top: 6px; }

    .card {
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }

    .wallet-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e1e2e;
    }

    .wallet-info { font-size: 0.85rem; color: #64748b; }
    .wallet-address { font-size: 0.8rem; color: #7c6aff; font-family: monospace; margin-top: 2px; }

    .btn-connect {
      padding: 8px 16px;
      background: #1e1e3f;
      border: 1px solid #7c6aff55;
      border-radius: 8px;
      color: #7c6aff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-connect:hover { background: #2a2a5a; }
    .btn-connect.connected { color: #3eb6ff; border-color: #3eb6ff55; background: #0f1f2f; cursor: default; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-color: #7c6aff; }
    textarea { resize: vertical; min-height: 80px; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c6aff, #3eb6ff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #64748b;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status.visible { display: flex; }

    .result { margin-top: 24px; display: none; }
    .result.visible { display: block; }

    .result-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-agent { background: #1e1e3f; color: #7c6aff; }
    .badge-xlm   { background: #0f2a1f; color: #3eb6ff; }

    .answer {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .sources-list { margin-top: 16px; }
    .sources-list p { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .sources-list a { display: block; font-size: 0.8rem; color: #3eb6ff; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .sources-list a:hover { text-decoration: underline; }

    .upload-field { display: none; margin-bottom: 16px; }
    .upload-field.visible { display: block; }

    .upload-drop {
      width: 100%;
      background: #0a0a0f;
      border: 2px dashed #1e1e2e;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-drop:hover, .upload-drop.dragover { border-color: #7c6aff; color: #94a3b8; }
    .upload-drop input[type="file"] { display: none; }
    .upload-preview {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #7c6aff;
    }

    .error-msg {
      background: #1f0f0f;
      border: 1px solid #3f1f1f;
      border-radius: 10px;
      padding: 14px 16px;
      color: #f87171;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Paygent</h1>
    <p>Pay XLM. Get answers. Powered by Stellar.</p>
  </header>

  <div class="tiers">
    <div class="tier" onclick="selectTier(this)" data-amount="0.1" data-type="search">
      <div class="price">0.1 XLM</div>
      <div class="label">Search</div>
      <div class="sources">Web search</div>
    </div>
    <div class="tier" onclick="selectTier(this)" data-amount="0.2" data-type="news">
      <div class="price">0.2 XLM</div>
      <div class="label">News</div>
      <div class="sources">Web + news</div>
    </div>
    <div class="tier selected" onclick="selectTier(this)" data-amount="0.3" data-type="research">
      <div class="price">0.3 XLM</div>
      <div class="label">Research</div>
      <div class="sources">Web + news + financial</div>
    </div>
    <div class="tier" onclick="selectTier(this)" data-amount="0.2" data-type="image_ocr">
      <div class="price">0.2 XLM</div>
      <div class="label">Image OCR</div>
      <div class="sources">Extract text from image</div>
    </div>
  </div>

  <div class="card">
    <div class="wallet-bar">
      <div>
        <div class="wallet-info" id="walletInfo">No wallet connected</div>
        <div class="wallet-address" id="walletAddress"></div>
      </div>
      <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </div>

    <div class="field">
      <label>Query</label>
      <textarea id="query" placeholder="What is the current Bitcoin price and market outlook?"></textarea>
    </div>

    <div class="upload-field" id="uploadField">
      <label>Image</label>
      <div class="upload-drop" id="uploadDrop" onclick="document.getElementById('imageInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="imageInput" accept="image/*" onchange="onFileSelected(this.files[0])">
        Click or drag an image here
      </div>
      <div class="upload-preview" id="uploadPreview"></div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="payAndAsk()">Pay & Ask</button>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Processing...</span>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script src="/stellar-wallets-kit.js"></script>
  <script>
    const { StellarWalletsKit, defaultModules, Networks } = SWK;

    StellarWalletsKit.init({
      modules: defaultModules(),
      network: Networks.TESTNET,
    });

    let walletAddress = null;
    let selectedAmount = '0.3';
    let selectedType = 'research';
    let selectedFile = null;

    window.selectTier = (el) => {
      document.querySelectorAll('.tier').forEach(t => t.classList.remove('selected'));
      el.classList.add('selected');
      selectedAmount = el.dataset.amount;
      selectedType = el.dataset.type;
      const uploadField = document.getElementById('uploadField');
      uploadField.className = selectedType === 'image_ocr' ? 'upload-field visible' : 'upload-field';
      if (selectedType !== 'image_ocr') { selectedFile = null; document.getElementById('uploadPreview').textContent = ''; }
    };

    window.onFileSelected = (file) => {
      selectedFile = file;
      document.getElementById('uploadPreview').textContent = file ? `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)` : '';
    };

    window.onDragOver = (e) => { e.preventDefault(); document.getElementById('uploadDrop').classList.add('dragover'); };
    window.onDragLeave = () => { document.getElementById('uploadDrop').classList.remove('dragover'); };
    window.onDrop = (e) => {
      e.preventDefault();
      document.getElementById('uploadDrop').classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) onFileSelected(file);
    };

    window.connectWallet = async () => {
      try {
        const { address } = await StellarWalletsKit.authModal();
        walletAddress = address;
        document.getElementById('walletInfo').textContent = 'Connected';
        document.getElementById('walletAddress').textContent = address.slice(0, 6) + '...' + address.slice(-4);
        const btn = document.getElementById('connectBtn');
        btn.textContent = 'Connected';
        btn.classList.add('connected');
      } catch (e) {
        // user closed the modal — not an error worth showing
        if (e?.code !== -1) showError('Could not connect: ' + (e?.message || e));
      }
    };

    window.payAndAsk = async () => {
      const query = document.getElementById('query').value.trim();
      if (selectedType === 'image_ocr' && !selectedFile) { showError('Please select an image to upload.'); return; }
      if (selectedType !== 'image_ocr' && !query) { showError('Please enter a query.'); return; }
      if (!walletAddress) { showError('Connect your wallet first.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('result').className = 'result';

      try {
        // Step 1: Build unsigned transaction
        setStatus('Building payment transaction...');
        const payRes = await fetch('/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pubkey: walletAddress, amount: selectedAmount }),
        });
        const { xdr, memo, error: payErr } = await payRes.json();
        if (payErr) throw new Error(payErr);

        // Step 2: Sign with chosen wallet
        setStatus('Waiting for wallet signature...');
        const { signedTxXdr } = await StellarWalletsKit.signTransaction(xdr, {
          networkPassphrase: Networks.TESTNET,
          address: walletAddress,
        });
        if (!signedTxXdr) throw new Error('Signing cancelled or failed.');

        // Step 3: Submit to Horizon
        setStatus('Submitting payment to Stellar...');
        const submitRes = await fetch('/submit-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ xdr: signedTxXdr }),
        });
        const { error: submitErr } = await submitRes.json();
        if (submitErr) throw new Error('Submission failed: ' + JSON.stringify(submitErr));

        // Step 4: Wait for Horizon to index, then query
        setStatus('Payment confirmed. Processing...');
        await delay(4000);

        let data;
        if (selectedType === 'image_ocr') {
          const form = new FormData();
          form.append('image', selectedFile);
          form.append('pubkey', walletAddress);
          form.append('memoId', memo);
          if (query) form.append('query', query);
          const queryRes = await fetch('/image-query', { method: 'POST', body: form });
          data = await queryRes.json();
          if (!queryRes.ok) throw new Error(data.error || 'Image OCR failed');
        } else {
          const queryRes = await fetch('/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, pubkey: walletAddress, memoId: memo }),
          });
          data = await queryRes.json();
          if (!queryRes.ok) throw new Error(data.error || 'Query failed');
        }

        showResult(data);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        hideStatus();
      }
    };

    function setStatus(msg) {
      document.getElementById('statusText').textContent = msg;
      document.getElementById('status').className = 'status visible';
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    function showResult(data) {
      const agents = (data.agentsUsed || []).map(a => `<span class="badge badge-agent">${a}</span>`).join('');
      const sources = (data.sources || []).map(s => `<a href="${s}" target="_blank" rel="noopener">${s}</a>`).join('');
      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="result-meta">
          ${agents}
          <span class="badge badge-xlm">${data.xlmCharged} XLM</span>
        </div>
        <div class="answer">${escapeHtml(data.answer)}</div>
        ${sources ? `<div class="sources-list"><p>Sources</p>${sources}</div>` : ''}
      `;
      result.className = 'result visible';
    }

    function showError(msg) {
      const result = document.getElementById('result');
      result.innerHTML = `<div class="error-msg">${escapeHtml(msg)}</div>`;
      result.className = 'result visible';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Pre-select the 0.3 XLM Research tier by default (already set in HTML)
  </script>
</body>
</html>
